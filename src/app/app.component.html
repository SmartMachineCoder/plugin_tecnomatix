<!-- Toast notifications (non-blocking) -->
<div class="toast-container">
  <div
    class="toast"
    *ngFor="let toast of toasts"
    [ngClass]="'toast-' + toast.level"
  >
    <span class="toast-message">{{ toast.message }}</span>
    <button class="toast-close" (click)="dismissToast(toast.id)">&#10005;</button>
  </div>
</div>

<!-- SETUP SCREEN -->
<app-setup
  *ngIf="!isSetupDone"
  (setupComplete)="onSetupComplete()"
></app-setup>

<!-- SETTINGS OVERLAY (re-uses setup component) -->
<div class="settings-overlay" *ngIf="isSettingsOpen">
  <div class="settings-overlay-backdrop" (click)="closeSettings()"></div>
  <div class="settings-overlay-panel">
    <app-setup (setupComplete)="onSettingsSaved()"></app-setup>
    <div class="settings-danger-zone">
      <button class="btn-danger" (click)="resetConfig()">Reset to defaults</button>
    </div>
  </div>
</div>

<!-- MAIN PLUGIN SCREEN -->
<div class="plugin-shell" *ngIf="isSetupDone && !isSettingsOpen">
  <!-- Top toolbar -->
  <div class="toolbar">
    <span class="toolbar-title">Plugin_Tecnomatix</span>
    <div class="toolbar-actions">
      <button class="toolbar-btn" title="Activity Log" (click)="toggleLog()">
        &#128203; Log
      </button>
      <button class="toolbar-btn" title="Settings" (click)="openSettings()">
        &#9881; Settings
      </button>
    </div>
  </div>

  <!-- Main content area: variable panel + basket panel -->
  <div class="content-area">

    <!-- Middle panel: Variable Selector + Chart + Bottom bar -->
    <div class="main-panel">
      <!-- Variable Selector (top half) -->
      <div class="variable-area">
        <app-variable-selector
          [assetId]="activeAssetId"
          [assetName]="selectedAsset?.name || ''"
          (selectionChanged)="onVariableSelectionChanged($event)"
        ></app-variable-selector>
      </div>

      <!-- Timeseries chart (bottom half of main panel) -->
      <div class="chart-area">
        <app-timeseries-chart
          [entries]="basketEntries"
          [lastRangeLabel]="lastRangeLabel"
          [lastRange]="lastRange"
        ></app-timeseries-chart>
      </div>

    </div>

    <!-- Right panel: Selection Basket + Send Panel -->
    <div class="basket-panel">
      <!-- Active range indicator -->
      <div class="range-indicator" *ngIf="lastRangeLabel && !isLive">
        <span class="range-icon">&#128197;</span>
        <span class="range-text">{{ lastRangeLabel }}</span>
      </div>
      <div class="range-indicator range-live" *ngIf="isLive">
        <span class="live-dot"></span>
        <span class="range-text">LIVE — next in {{ liveCountdownDisplay }}</span>
      </div>
      <div class="range-indicator range-none" *ngIf="!lastRangeLabel && !isLive">
        <span class="range-text">Select a time range in the Monitor date picker</span>
      </div>

      <app-selection-basket
        [entries]="basketEntries"
        [lastRange]="lastRange"
        [isLive]="isLive"
        (removeEntry)="onBasketRemove($event)"
        (clearAll)="onBasketClear()"
        (sendAll)="onBasketSendAll()"
        (startLive)="onStartLive()"
        (stopLive)="onStopLive()"
      ></app-selection-basket>

      <!-- Send Panel: status + log -->
      <app-send-panel
        [asset]="selectedAsset"
        [selectedVariables]="selectedVariables"
        [basketEntries]="basketEntries"
        [isLive]="isLive"
      ></app-send-panel>
    </div>
  </div>
</div>
